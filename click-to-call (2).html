<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click-to-Call · Handix</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --surface: #13161e; --surface2: #1a1e2a;
      --border: #252a38; --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
      --accent-glow: rgba(0,229,160,0.3); --red: #ff4d6d; --red-dim: rgba(255,77,109,0.12);
      --yellow: #ffd166; --text: #e8eaf0; --text-muted: #6b7390; --text-dim: #3d4460;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events:none;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      width: 100%; max-width: 400px; overflow: hidden; position: relative;
      box-shadow: 0 0 60px rgba(0,229,160,0.05), 0 24px 48px rgba(0,0,0,0.4);
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity:0.6;
    }
    .header { padding:24px 28px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .phone-icon {
      width:40px; height:40px; background:var(--accent-dim); border:1px solid rgba(0,229,160,0.2);
      border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .phone-icon svg { width:18px; height:18px; fill:var(--accent); }
    .header-text h1 { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.2px; }
    .header-text p { font-size:12px; color:var(--text-muted); margin-top:2px; font-family:var(--mono); }
    .body { padding:24px 28px; }
    .info-block { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:20px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
    .info-row + .info-row { border-top:1px solid var(--border); margin-top:8px; padding-top:12px; }
    .info-label { font-size:11px; font-family:var(--mono); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
    .info-value { font-size:13px; font-family:var(--mono); color:var(--text); font-weight:500; }
    .info-value.loading { color:var(--text-dim); font-style:italic; }
    .field-group { margin-bottom:16px; }
    label { display:block; font-size:11px; font-family:var(--mono); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    input {
      width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
      padding:10px 14px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color:rgba(0,229,160,0.4); box-shadow:0 0 0 3px var(--accent-dim); }
    input::placeholder { color:var(--text-dim); }
    .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
    .btn-call {
      width:100%; padding:14px; background:var(--accent); color:#0d0f14; border:none; border-radius:10px;
      font-family:var(--sans); font-size:14px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:all 0.2s; position:relative; overflow:hidden; letter-spacing:0.2px;
    }
    .btn-call:hover:not(:disabled) { background:#00ffb0; box-shadow:0 0 24px var(--accent-glow); transform:translateY(-1px); }
    .btn-call:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-call svg { width:16px; height:16px; fill:currentColor; flex-shrink:0; }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(1.6);opacity:0} }
    .btn-call.calling::before { content:''; position:absolute; inset:0; background:var(--accent); border-radius:10px; animation:pulse-ring 1s ease-out infinite; }
    .status { margin-top:16px; padding:12px 16px; border-radius:8px; font-size:13px; font-family:var(--mono); display:none; align-items:flex-start; gap:10px; line-height:1.5; }
    .status.show { display:flex; }
    .status.loading { background:var(--accent-dim); border:1px solid rgba(0,229,160,0.2); color:var(--accent); }
    .status.success { background:var(--accent-dim); border:1px solid rgba(0,229,160,0.2); color:var(--accent); }
    .status.error { background:var(--red-dim); border:1px solid rgba(255,77,109,0.2); color:var(--red); }
    .status.warn { background:rgba(255,209,102,0.1); border:1px solid rgba(255,209,102,0.2); color:var(--yellow); }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .status.success .status-dot, .status.loading .status-dot { background:var(--accent); }
    .status.error .status-dot { background:var(--red); }
    .status.warn .status-dot { background:var(--yellow); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status.loading .status-dot { animation:blink 1s ease-in-out infinite; }
    .response-box { margin-top:12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:var(--mono); font-size:11px; color:var(--text-muted); white-space:pre-wrap; word-break:break-all; display:none; max-height:120px; overflow-y:auto; }
    .response-box.show { display:block; }
    .footer { padding:14px 28px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .footer-tag { font-size:10px; font-family:var(--mono); color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; }
    .status-indicator { display:flex; align-items:center; gap:6px; font-size:10px; font-family:var(--mono); color:var(--text-muted); }
    .status-indicator .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="phone-icon">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
    </div>
    <div class="header-text">
      <h1>Click-to-Call</h1>
      <p>tiagoeletronicos · SaperX</p>
    </div>
  </div>

  <div class="body">
    <div class="info-block">
      <div class="info-row">
        <span class="info-label">Atendimento</span>
        <span class="info-value loading" id="display-session">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Destino</span>
        <span class="info-value" id="display-dest">—</span>
      </div>
    </div>

    <div class="field-group">
      <label>Seu Ramal *</label>
      <input type="text" id="caller_number" placeholder="200" />
    </div>

    <div class="field-group">
      <label>Número de Destino *</label>
      <input type="text" id="destination_number" placeholder="5511999999999" />
    </div>

    <hr class="divider">

    <button class="btn-call" id="btn-call" onclick="ligar()">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      Iniciar Ligação
    </button>

    <div class="status" id="status">
      <div class="status-dot"></div>
      <span id="status-msg"></span>
    </div>
    <div class="response-box" id="response-box"></div>
  </div>

  <div class="footer">
    <span class="footer-tag">Handix Telephony · v1.1</span>
    <span class="status-indicator"><span class="dot"></span>API pronta</span>
  </div>
</div>

<script>
  // ─── Configuração fixa ──────────────────────────────────────────────────────
  const API_BASE     = 'https://phx.falehandix.com.br/api';
  const API_TOKEN    = 'Bearer a1d4008c-f8ff-4fda-bcda-95d19c1273f3|9nj3L54sSIgpNzG8O0FmdK9e5zJcmk4T8RbLyT6Je43a8b99';
  const DOMAIN_ID    = 'a1588a15-2c9f-45bc-bd42-8215ec788f17';
  const GATEWAY_UUID = 'b6382d85-2cb0-446e-84a9-333cd01bf8f5';

  // ─── Parâmetros da URL ──────────────────────────────────────────────────────
  const params       = new URLSearchParams(window.location.search);
  const sessionId    = params.get('session_id') || params.get('id') || '';
  const phoneFromUrl = params.get('phone') || params.get('contact_phone') || '';

  if (sessionId) {
    document.getElementById('display-session').textContent = sessionId;
    document.getElementById('display-session').classList.remove('loading');
  }
  if (phoneFromUrl) {
    document.getElementById('display-dest').textContent = phoneFromUrl;
    document.getElementById('destination_number').value = phoneFromUrl;
  }

  // Persistir ramal do atendente
  const savedRamal = localStorage.getItem('handix_caller');
  if (savedRamal) document.getElementById('caller_number').value = savedRamal;
  document.getElementById('caller_number').addEventListener('change', e => {
    localStorage.setItem('handix_caller', e.target.value);
  });

  // ─── Ligar ──────────────────────────────────────────────────────────────────
  async function ligar() {
    const caller      = document.getElementById('caller_number').value.trim();
    const destination = document.getElementById('destination_number').value.trim();

    if (!caller || !destination) {
      showStatus('warn', 'Preencha o ramal e o número de destino.');
      return;
    }

    const btn = document.getElementById('btn-call');
    btn.disabled = true;
    btn.classList.add('calling');
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="fill:currentColor;width:16px;height:16px"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg> Conectando...`;

    showStatus('loading', 'Enviando requisição à API Handix...');
    document.getElementById('response-box').classList.remove('show');

    try {
      const resp = await fetch(`${API_BASE}/telephony/click-to-call`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': API_TOKEN },
        body: JSON.stringify({
          domain_id:          DOMAIN_ID,
          gateway_uuid:       GATEWAY_UUID,
          caller_number:      caller,
          destination_number: destination
        })
      });

      const data = await resp.json();
      const box = document.getElementById('response-box');
      box.textContent = JSON.stringify(data, null, 2);
      box.classList.add('show');

      if (resp.ok && data.success) {
        showStatus('success', 'Ligação iniciada! Call ID: ' + (data.data?.call_id || '—'));
      } else if (resp.status === 401) {
        showStatus('error', '401 — Token inválido ou expirado.');
      } else if (resp.status === 404) {
        showStatus('error', '404 — Gateway não encontrado.');
      } else if (resp.status === 422) {
        showStatus('error', '422 — Dados inválidos: ' + (data.message || JSON.stringify(data.errors)));
      } else {
        showStatus('error', 'Erro ' + resp.status + ': ' + (data.message || 'Falha desconhecida.'));
      }
    } catch(e) {
      showStatus('error', 'Erro de rede: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('calling');
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="fill:currentColor;width:16px;height:16px"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg> Iniciar Ligação`;
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status show ' + type;
    document.getElementById('status-msg').textContent = msg;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') ligar(); });
</script>
</body>
</html>
